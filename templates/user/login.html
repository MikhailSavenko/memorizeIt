{% extends "base.html" %}


{% block title %}{{ title }}{% endblock title %}


{% block content %}
    <div class="register-form">
        <form method="post" action={% url "user:login" %}>
            <h3 class="display-4">Log in your account 🔓</h2>
            <h3 class="display-6">And start repeat your words 💡</h3>
            {% csrf_token %}
            <p>{{ form.username }}</p>
            <p>{{ form.password }}</p>
            {% if form.errors %}
                <div class="alert alert-danger">
                    {{ form.errors }}
                </div>
            {% endif %}
            <button class='btn btn-success' type="submit">Login</button>
        </form>
    </div>
{% endblock content %}
