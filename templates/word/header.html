<header class="p-3 mb-3 border-bottom">
    <div class="container" bis_skin_checked="1">
      <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start" bis_skin_checked="1">
        <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none">
          <svg class="bi me-2" width="40" height="32" role="img" aria-label="Bootstrap"><use xlink:href="#bootstrap"></use></svg>
        </a>

        <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
          <li><a href="{% url 'word:home' %}" class="nav-link px-2 link-secondary">Hello English</a></li>
          <li><a href="{% url 'word:create_room' %}" class="nav-link px-2 link-body-emphasis">Repeat words</a></li>
          <li><a href="{% url 'word:new_word' %}" class="nav-link px-2 link-body-emphasis">Add new word</a></li>
          <li><a href="{% url 'word:dictionary' %}" class="nav-link px-2 link-body-emphasis">Your dictionary</a></li>
        </ul>

        <form action="{% url 'word:search' %}" method="get"  class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
          {% csrf_token %}
          <input type="search" name="search" class="form-control" placeholder="Search..." aria-label="Search">
        </form>

        <div class="dropdown text-end" bis_skin_checked="1">
          <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle" style="width: 32px; height: 32px; font-size: 20px; line-height: 1;">
            {% if user.is_superuser %}👑{% else %}🧑‍🎓{% endif %}
        </span>
          </a>
           <ul class="dropdown-menu text-small">
            <li><a class="dropdown-item" href="{% url 'user:register_user' %}">Register</a></li>
            <li><a class="dropdown-item" href="#">Settings</a></li>
            <li><a class="dropdown-item" href="#">Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Sign out</a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>
